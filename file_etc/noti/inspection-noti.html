<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style-nomal.css" type="text/css">
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <link rel="stylesheet" href="css/inspection-style.css" type="text/css">
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <title>Reward Plus</title>
</head>

<body>
    <div id="index" class="inspection">
        <div class="wrap">
            <div class="contant">
                <div class="title">
                    
                    <div class="logo">
                        <img src="imgs/reward-shopping.png">
                    </div>
                    <p class="tit">G마켓 적립 서비스 <br>일시 중단 안내</p>
                </div>

                <div class="note">
                    <div class="box2">
                    <p>
                        G마켓의 운영 정책 및 예산 조정으로 인해 <br><span>서비스 이용이 일시적으로 제한되고 있습니다.</span>
                    </p>
                    
                    <p>
                        갑작스러운 중단 소식에 아쉬움을 느끼실 고객님<br>들께 진심으로 사과의 말씀을 올립니다.
                    </p>
                    
                    <p>
                        <span>최대한 이른 시일 내에 서비스를 다시 정상화하여<br></span> 고객님의 쇼핑 혜택을 되찾아 드릴 수 있도록 모든<br> 역량을 집중하겠습니다.
                    </p>
                    </div>
                    <div class="time">
                        <div class="box">

                            <p class="todo">
                                중단 일시 : 6월 16일(화) ~ 안정화 완료 시점
                            </p>
                        </div>
                    </div>
                </div>

                <div class="btn">
                    <button onclick="closeBtn();">
                        닫기
                    </button>
                    <!-- <p class="sub">
                        ※ 이용문의: 영웅문 > 쿠팡혜택 페이지 상단 문의하기
                    </p> -->
                </div>

            </div>
        </div>

    </div>

    <script>
        // 닫기 버튼
        function closeBtn() {
            window.close();
        }

    </script>

</body>
</html>
