<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핀크럭스 주간 보고</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  html, body { height: 100%; background: var(--bg); }
  body {
    display: flex;
    justify-content: center;
    align-items: stretch;
    height: 100vh;
    overflow: hidden;
  }
  #layout {
    display: flex;
    width: 1024px;
    max-width: 100%;
    height: 100vh;
    box-shadow: 0 0 0 1px var(--border);
    background: var(--surface);
    overflow: hidden;
  }
  #viewer { flex: 1; border: none; background: #fff; overflow: auto; }
</style>
</head>
<body>

<div id="layout">
  <nav id="sidebar">
    <h2>주간 보고</h2>
    <div id="week-list"></div>
  </nav>
  <iframe id="viewer" src="about:blank"></iframe>
</div>

<script>
// ── 주차 목록: 새 주차 추가 시 여기에 추가 ──
const WEEKS = [
  { id: '2026-W25', label: '6월 3주' },
  { id: '2026-W26', label: '6월 4주' },
  { id: '2026-W27', label: '7월 1주' },
  { id: '2026-W28', label: '7월 2주' },
  { id: '2026-W29', label: '7월 3주' },
  { id: '2026-W30', label: '7월 4주' },
];

const list = document.getElementById('week-list');
const viewer = document.getElementById('viewer');

function loadWeek(id) {
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + id).classList.add('active');
  viewer.src = 'data/' + id + '.html';
}

WEEKS.forEach(w => {
  const btn = document.createElement('button');
  btn.className = 'week-btn';
  btn.id = 'btn-' + w.id;
  btn.textContent = w.label;
  btn.onclick = () => loadWeek(w.id);
  list.appendChild(btn);
});

// 최신 주차 자동 로드
if (WEEKS.length) loadWeek(WEEKS[WEEKS.length - 1].id);
</script>
</body>
</html>
