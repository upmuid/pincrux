    <body>
        <div id="wrap">
            <div class="bg01 offer-coupon-detail">
                <!-- 상단 바 -->

                    <button type="button" class="btn-back" onclick="history.back()"></button>
                    <!-- 타이틀변경가능 -->
                    <h1 class="header-title">빌레터콘</h1>

                <div class="center-container">
                <!-- 메인 콘텐츠 -->
                <div class="content-inner coupon-title-wrap">
                <!-- 로티 아이콘 -->
                <dotlottie-wc
                    src="https://lottie.host/2025d5f5-037b-472d-80d9-032d60b505eb/6ij5zmn4v7.lottie"
                    style="width: 4rem; height: 4rem"
                    autoplay="autoplay">

                <div class="coupon-title">
                    <p class="success-title">쿠폰 교환이<br>완료되었어요</p>
                </div>

                <div class="item-row coupon-item-wrap">

                <div class="item-colum">
                <!--상품 브랜드-->
                    <p class="item-sub">sk 에너지</p>
                <!--상품 타이틀-->
                    <p class="item-name coupon-name">sk모바일주유권 1억 5천만원권</p>
                </div>
                </div>
            </div>
                <!--유의사항 -->
                <section class="info-section" style="margin: 0 1rem;">
                    <h2 class="coupon-info-title">유의사항</h2>
                    <div class="coupon-info-box">
                        <p>- 모바일 쿠폰은 유효기간 내에만 사용 가능합니다.
                            - (유효기간 연장, 환불, 재발행 불가)
                            - 번호를 정확히 입력해 주세요. 오입력으로 쿠폰을 받지 못할 경우, 당사는 책임을 지지 않습니다.
                            - (주)핀크럭스는 쿠폰 발송을 위해 휴대폰 번호를 수집하며, 해당 정보는 쿠폰 발송 이외의 용도로는 사용되지 않습니다.
                        </p>
                    </div>
                </section>
                </div>
                </main>

                <!-- 푸터 -->
                <footer class="footer">
                    <div class="footer__left">
                        <p class="footer__title">PINCRUX OFFERWALL</p>
                        <p class="footer__copy">COPYRIGHT © PINCRUX</p>
                    </div>
                    <div class="footer__right">
                        <a href="#" class="footer__link">이용문의 및 약관</a>
                    </div>
                </footer>
            </div>

<script  src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
